    <div class="container">
        <div class="form-section">
            <div class="form-box">
                <h1>Create an account</h1>
                <p>Sign up and get 30 day free trial</p>

                <form>
                    <label>Full name</label>
                    <input type="text" placeholder="Amelie Laurent">
                    <label>Phone</label>
                    <div class="phone-group">
                        <select class="country-code">
                            <option value="+20">Egypt (+20)</option>
                            <option value="+966">Saudi Arabia (+966)</option>
                            <option value="+971">UAE (+971)</option>
                            <option value="+1">USA (+1)</option>
                        </select>

                        <input type="tel" id="phone" name="phone" maxlength="11" pattern="\d{11}"
                            placeholder="ادخل رقم تواصل" required>

                    </div>
                    <label>Email</label>
                    <input type="email" placeholder="amelielaurent762@gmail.com">

                    <label>Password</label>
                    <input type="password" placeholder="••••••••••••">

                    <label> Confirm Password</label>
                    <input type="password" placeholder="••••••••••••">

                    <button type="submit">Submit</button>
                </form>
                <br>
                <div class="bottom-text">
                    <span>Have any account?<a href="./login.html">Sing in</a></span>
                </div>
            </div>
        </div>
        <div class="image-section">
            <img src="../images/WhatsApp Image 2026-04-29 at 2.23.12 AM.jpeg" alt="Team Meeting">
        </div>
