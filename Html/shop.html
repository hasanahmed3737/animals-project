<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>animal shop 🥰</title>
        <meta name="description" content=" An opportunity to have a pet companion in your company">
        <link rel="stylesheet" href="../css/shop.css">       
        <link rel="action" href=""><!--لملف ال js-->>
    </head>
    <body>
        <main>
            <input id="search" type="text" placeholder="search 🔍" > </input>
            <section>
                <div>
                    <span class="animal-icon">🐠</span>
                    <p><strong>Fish</strong></p>
                    <span>Price: <b>150 EGP</b></span>
                    <input class="input" type="submit" value="Buy">
                </div>

                <div>
                    <span class="animal-icon">🐍</span>
                    <p><strong>Snake</strong></p>
                    <span>Price: <b>100 EGP</b></span>
                    <input class="input" type="submit" value="Buy">
                </div>

                <div>
                    <span class="animal-icon">🦜</span>
                    <p><strong>Lovebird</strong></p>
                    <span>Price: <b>200 EGP</b></span>
                    <input class="input" type="submit" value="Buy">
                </div>

                <div>
                    <span class="animal-icon">🐇</span>
                    <p><strong>Rabbit</strong></p>
                    <span>Price: <b>75 EGP</b></span>
                    <input class="input" type="submit" value="Buy">
                </div>

                <div>
                    <span class="animal-icon">🦤</span>
                    <p><strong>duck</strong></p>
                    <span>Price: <b>250 EGP</b></span>
                    <input class="input" type="submit" value="Buy">
                </div>

                <div>
                    <span class="animal-icon">🐢</span>
                    <p><strong>Turtle</strong></p>
                    <span>Price: <b>500 EGP</b></span>
                    <input class="input" type="submit" value="Buy">
                </div>

                <div>
                    <span class="animal-icon">🦔</span>
                    <p><strong>Hedgehog</strong></p>
                    <span>Price: <b>300 EGP</b></span>
                    <input class="input" type="submit" value="Buy">
                </div>

                <div>
                    <span class="animal-icon">🐕‍🦺</span>
                    <p><strong>dog</strong></p>
                    <span>Price: <b>75 EGP</b></span>
                    <input class="input" type="submit" value="Buy">
                </div>

            </section>
        </main>
        <footer></footer>
        <script>
            const searchInput = document.getElementById('search');
            const animals = document.querySelectorAll('section div');

            searchInput.addEventListener('keyup', (e) => {
                const term = e.target.value.toLowerCase();

                animals.forEach(animal => {
                    const name = animal.querySelector('p').textContent.toLowerCase();

                    if (name.includes(term)) {
                        animal.style.display = 'flex';
                    } else {
                        animal.style.display = 'none';
                    }
                });
            });
        </script>
    </body>
</html>
